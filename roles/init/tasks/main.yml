---
- name: Init | Set hostname
  ansible.builtin.hostname:
    name: "{{ hostname|quote }}"
    use: systemd
  tags: hostname

- name: Init | Set env
  ansible.builtin.copy:
    src: "ipenv.sh"
    dest: "/etc/profile.d/"
    owner: root
    group: root
  tags: os_env

- name: Init | Set timezone
  community.general.timezone:
    name: "{{ system.timezone }}"
  tags: timezone

- name: Init | Disable systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd.service
    enabled: false
    state: stopped
  when:
    - system.ntp_enabled
    - ansible_os_family in ["Debian"]
  tags: ntp

- name: Init | Install chrony
  ansible.builtin.package:
    name: chrony
    state: present
  when:
    - system.ntp_enabled
  tags: ntp

- name: Init | Generate NTP configuration file
  ansible.builtin.template:
    src: "chrony.conf.j2"
    dest: "/etc/chrony.conf"
  when:
    - system.ntp_enabled
  notify:
    - restart chronyd
  tags: ntp

- name: Init | Check if /etc/fstab exists
  ansible.builtin.stat:
    path: "/etc/fstab"
    get_attributes: false
    get_checksum: false
    get_mime: false
  register: fstab_file
  tags: swap

- name: Init | Remove swapfile from /etc/fstab
  ansible.posix.mount:
    name: "{{ item }}"
    fstype: swap
    state: absent
  loop:
    - swap
    - none
  when: fstab_file.stat.exists
  tags: swap

- name: Init | Mask swap.target (persist swapoff)
  ansible.builtin.systemd:
    name: swap.target
    masked: true
  tags: swap

- name: Init | Disable swap
  ansible.builtin.command: /sbin/swapoff -a
  tags: swap

- name: Init | Config selinux"
  ansible.posix.selinux:
    policy: "{{ 'targeted' if system.selinux_enabled == true else omit }}"
    state: "{{ 'enforcing' if system.selinux_enabled == true else 'disabled' }}"
  when:
    - ansible_os_family in ['RedHat', 'AlmaLinux', 'Rocky', 'TencentOS']
  tags: security

- name: Init | Config apparmor
  ansible.builtin.systemd:
    name: apparmor
    enabled: "{{ system.selinux_enabled }}"
    masked: false
    state: "{{ 'started' if system.selinux_enabled == true else 'stopped' }}"
  when:
    - ansible_os_family in ["Debian"]
  tags: security

- name: Init | Check firewalld
  ansible.builtin.command: whereis firewalld
  register: firewalld_state
  tags: firewalld

- name: Init | Config firewalld
  when: "'/usr/sbin/firewalld' in firewalld_state.stdout"
  ansible.builtin.systemd:
    name: firewalld
    enabled: "{{ system.firewalld_enabled }}"
    masked: false
    state: "{{ 'started' if system.firewalld_enabled == true else 'stopped' }}"
  tags: firewalld

- name: Init | Sync authorized_key
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', system.ssh_key_path) }}"
    manage_dir: yes
  when:
    - not system.allow_password_authentication
  tags: sshd

- name: Init | Set sshd_config
  ansible.builtin.lineinfile:
    dest: "/etc/ssh/sshd_config"
    regexp: "^{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  with_items:
    - { regexp: "UseDNS", line: "UseDNS no" }
    - { regexp: "ClientAliveInterval", line: "ClientAliveInterval 600" }
    - { regexp: "ClientAliveCountMax", line: "ClientAliveCountMax 2" }
    - { regexp: "PermitRootLogin", line: "PermitRootLogin yes" }
    - { regexp: "PermitEmptyPasswords", line: "PermitEmptyPasswords no" }
    - { regexp: "PasswordAuthentication", line: "PasswordAuthentication {{ 'yes' if system.allow_password_authentication else 'no' }}" }
  notify:
    - restart sshd
  tags: sshd

- name: Init | Set limits.conf
  community.general.pam_limits:
    dest: "/etc/security/limits.conf"
    domain: '{{ item.limit_domain }}'
    limit_type: "{{ item.limit_type }}"
    limit_item: "{{ item.limit_item }}"
    value: "{{ item.value }}"
  with_items:
    - { limit_domain: 'root',limit_type: 'soft',limit_item: 'nofile', value: '655360' }
    - { limit_domain: 'root',limit_type: 'hard',limit_item: 'nofile', value: '655360' }
    - { limit_domain: '*',limit_type: 'soft',limit_item: 'nproc', value: '655360' }
    - { limit_domain: '*',limit_type: 'hard',limit_item: 'nproc', value: '655360' }
    - { limit_domain: '*',limit_type: 'soft',limit_item: 'nofile', value: '655360' }
    - { limit_domain: '*',limit_type: 'hard',limit_item: 'nofile', value: '655360' }
  tags: limits

- name: Init | Set sysctl parameters
  ansible.posix.sysctl:
    sysctl_file: "/etc/sysctl.d/99-sysctl.conf"
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: yes
  with_items:
    - {name: 'kernel.sysrq',value: '1' }
    - {name: 'vm.swappiness',value: '0' }
    - {name: 'net.ipv4.ip_forward',value: '1' }
    - {name: 'net.ipv4.neigh.default.gc_stale_time',value: '120' }
    - {name: 'net.ipv4.conf.all.rp_filter',value: '0' }
    - {name: 'net.ipv4.conf.default.rp_filter',value: '0' }
    - {name: 'net.ipv4.conf.default.arp_announce ',value: ' 2' }
    - {name: 'net.ipv4.conf.lo.arp_announce',value: '2' }
    - {name: 'net.ipv4.conf.all.arp_announce',value: '2' }
    - {name: 'net.ipv4.tcp_max_tw_buckets',value: '5000' }
    - {name: 'net.ipv4.tcp_syncookies',value: ' 1' }
    - {name: 'net.ipv4.tcp_synack_retries',value: '2' }
    - {name: 'net.ipv4.tcp_slow_start_after_idle',value: '0'}
    - {name: 'net.ipv4.ip_local_port_range',value: '20000 60999' }
  tags:
    - sysctl
    - system_sysctl

- name: Init | Set sysctl ipv6 parameters
  ansible.posix.sysctl:
    sysctl_file: "/etc/sysctl.d/99-sysctl.conf"
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: yes
  with_items:
    - {name: 'net.ipv6.conf.all.disable_ipv6',value: '0' }
    - {name: 'net.ipv6.conf.default.disable_ipv6',value: '0' }
    - {name: 'net.ipv6.conf.lo.disable_ipv6',value: '0' }
    - {name: 'net.ipv6.conf.all.forwarding',value: '1' }
  when: ( kubernetes.ipv6_stack is defined ) and ( kubernetes.ipv6_stack | bool )
  tags:
    - sysctl
    - system_sysctl

- name: Init | Config systemd-journald
  ansible.builtin.file:
    path: "/var/log/journal"
    owner: root
    group: systemd-journal
    mode: 2775
    state: directory
  notify:
    - restart systemd-journald
  when:
    - ansible_os_family in ['RedHat', 'AlmaLinux', 'Rocky', 'TencentOS']
  tags: journal

- name: Init | Install base application
  ansible.builtin.package:
    name:
      - vim
      - mtr
      - tar
      - curl
      - wget
      - lsof
      - unzip
      - lrzsz
      - rsync
      - telnet
      - bash-completion
    state: present
  tags: install_app

- name: Init | Install base application
  ansible.builtin.package:
    name:
      - nmap-ncat
      - nfs-utils
      - iproute
      - policycoreutils-python-utils
    state: present
  when:
    - ansible_os_family in ['RedHat', 'AlmaLinux', 'Rocky', 'TencentOS']
  tags: install_app

- name: Init | Install base application
  ansible.builtin.package:
    name:
      - nmap
      - nmap-common
      - nfs-common
      - iproute2
      - gnupg
    state: present
  when:
    - ansible_os_family in ["Debian"]
  tags: install_app
