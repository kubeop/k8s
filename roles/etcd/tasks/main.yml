---
- name: Etcd | Create etcd group
  ansible.builtin.group:
    name: etcd
    gid: 201
    system: true
  tags:
    - create_etcd_group
    - install_etcd

- name: Etcd | Create etcd user
  ansible.builtin.user:
    name: etcd
    uid: 201
    group: etcd
    comment: "Etcd User"
    create_home: false
    home: "{{ etcd.data_dir }}"
    shell: /sbin/nologin
    system: true
  tags:
    - create_etcd_user
    - install_etcd

- name: Etcd | Unarchive etcd
  ansible.builtin.unarchive:
    src: "{{ download.dest }}/etcd/{{ etcd.version }}/etcd-{{ etcd.version }}-linux-{%- if ansible_architecture == 'x86_64' -%}amd64{%- else -%}arm64{%- endif -%}.tar.gz"
    dest: /tmp/
    remote_src: no
    extra_opts:
    - --strip-components=1
    exclude:
    - "README*"
    - "Documentation"
  tags: install_etcd

- name: Etcd | Install etcd
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/usr/bin/"
    owner: root
    group: root
    mode: 0755
    remote_src: yes
  with_items:
    - {src: "/tmp/etcd"}
    - {src: "/tmp/etcdctl"}
    - {src: "/tmp/etcdutl"}
  tags: install_etcd
  notify:
    - restart etcd

- name: Etcd | Distribution certs
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/etcd/pki/"
    owner: root
    group: root
    mode: 0644
  with_items:
    - "{{ certificates.dir }}/etcd-ca.pem"
    - "{{ certificates.dir }}/{{ ansible_hostname.split('-')[-2:] | join('-') | lower }}/etcd-server.pem"
    - "{{ certificates.dir }}/{{ ansible_hostname.split('-')[-2:] | join('-') | lower }}/etcd-server.key"
    - "{{ certificates.dir }}/{{ ansible_hostname.split('-')[-2:] | join('-') | lower }}/etcd-peer.pem"
    - "{{ certificates.dir }}/{{ ansible_hostname.split('-')[-2:] | join('-') | lower }}/etcd-peer.key"
    - "{{ certificates.dir }}/{{ ansible_hostname.split('-')[-2:] | join('-') | lower }}/etcd-healthcheck-client.pem"
    - "{{ certificates.dir }}/{{ ansible_hostname.split('-')[-2:] | join('-') | lower }}/etcd-healthcheck-client.key"
  tags:
    - dis_etcd_certs
    - dis_certs

- name: Etcd | Create etcd data directory
  ansible.builtin.file:
    path: "{{ etcd.data_dir }}"
    owner: etcd
    group: etcd
    mode: 0700
    state: directory
  tags:
    - create_etcd_data_dir
  notify:
    - restart etcd

- name: Etcd | Generate etcd configure
  ansible.builtin.template:
    src: "etcd.conf.j2"
    dest: "/etc/etcd/etcd.conf"
  tags: dis_etcd_config
  notify:
    - restart etcd

- name: Etcd | Generate etcd systemd unit
  ansible.builtin.template:
    src: "etcd.service.j2"
    dest: "/usr/lib/systemd/system/etcd.service"
  tags: dis_etcd_config
  notify:
    - restart etcd
