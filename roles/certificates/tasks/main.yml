---
- name: Cert | Create directory
  ansible.builtin.file:
    path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}"
    state: directory
  with_items:
    - "{{ groups['etcd'] }}"
    - "{{ groups['master'] }}"
    - "{{ groups['worker'] }}"

# etcd-ca
- name: Cert | Check if etcd-ca.key exists
  ansible.builtin.stat:
    path: "{{ certificates.dir }}/etcd-ca.key"
  register: etcd_ca_key

- name: Cert | Generate etcd-ca.key
  when: not etcd_ca_key.stat.exists
  community.crypto.openssl_privatekey:
    path: "{{ certificates.dir }}/etcd-ca.key"
    type: "{{ certificates.type }}"
    size: "{{ certificates.size }}"
    curve: "{{ 'secp256r1' if certificates.type == 'ECC' else omit }}"

- name: Cert | Check if etcd-ca.csr exists
  ansible.builtin.stat:
    path: "{{ certificates.dir }}/etcd-ca.csr"
  register: etcd_ca_csr

- name: Cert | Generate etcd-ca.csr
  when: not etcd_ca_csr.stat.exists
  community.crypto.openssl_csr:
    path: "{{ certificates.dir }}/etcd-ca.csr"
    privatekey_path: "{{ certificates.dir }}/etcd-ca.key"
    use_common_name_for_san: no
    common_name: etcd-ca
    create_subject_key_identifier: yes
    basic_constraints_critical: yes
    basic_constraints:
      - CA:TRUE
    key_usage_critical: yes
    key_usage:
      - digitalSignature
      - keyEncipherment
      - keyCertSign
    subject_alt_name: "DNS:etcd-ca"

- name: Cert | Check if etcd-ca.pem exists
  ansible.builtin.stat:
    path: "{{ certificates.dir }}/etcd-ca.pem"
  register: etcd_ca_pem

- name: Cert | Generate etcd-ca.pem
  when: not etcd_ca_pem.stat.exists
  community.crypto.x509_certificate:
    path: "{{ certificates.dir }}/etcd-ca.pem"
    provider: selfsigned
    selfsigned_not_after: "+{{certificates.day}}"
    selfsigned_create_subject_key_identifier: never_create
    privatekey_path: "{{ certificates.dir }}/etcd-ca.key"
    csr_path: "{{ certificates.dir }}/etcd-ca.csr"

# etcd-server
- name: Cert | Generate etcd-server.key
  community.crypto.openssl_privatekey:
    path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/etcd-server.key"
    type: "{{ certificates.type }}"
    size: "{{ certificates.size }}"
    curve: "{{ 'secp256r1' if certificates.type == 'ECC' else omit }}"
  with_items:
    - "{{ groups['etcd'] }}"

- name: Cert | Generate etcd-server.csr
  community.crypto.openssl_csr:
    path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/etcd-server.csr"
    privatekey_path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/etcd-server.key"
    common_name: "{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}"
    basic_constraints_critical: yes
    basic_constraints:
      - CA:FALSE
    key_usage_critical: yes
    key_usage:
      - digitalSignature
      - keyEncipherment
    extended_key_usage:
      - serverAuth
      - clientAuth
    subject_alt_name:
      - DNS:localhost
      - DNS:{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower  }}
