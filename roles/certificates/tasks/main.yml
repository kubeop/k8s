  register: sa_key

- name: Cert | Generate sa.key
  when: not sa_key.stat.exists
  community.crypto.openssl_privatekey:
    path: "{{ certificates.dir }}/sa.key"
    type: "{{ certificates.type }}"
    size: "{{ certificates.size }}"
    curve: "{{ 'secp256r1' if certificates.type == 'ECC' else omit }}"

- name: Cert | Check if sa.pub exists
  ansible.builtin.stat:
    path: "{{ certificates.dir }}/sa.pub"
  register: sa_pub

- name: Cert | Generate sa.pub
  when: not sa_pub.stat.exists
  community.crypto.openssl_publickey:
    path: "{{ certificates.dir }}/sa.pub"
    privatekey_path: "{{ certificates.dir }}/sa.key"

# token
- name: Cert | Check if token exists
  ansible.builtin.stat:
    path: "{{ certificates.dir }}/token"
  register: token

- name: Cert | Generate bootstrap token
  when: not token.stat.exists
  ansible.builtin.set_fact:
    bootstrap_token: "{{ lookup('password', '/dev/null length=6 chars=ascii_lowercase,digits') }}.{{ lookup('password', '/dev/null length=16 chars=ascii_lowercase,digits') }}"

- name: Cert | Generate bootstrap-token file
  when: not token.stat.exists
  ansible.builtin.blockinfile:
    path: "{{ certificates.dir }}/token"
    block: "{{ bootstrap_token }}"
    create: true
