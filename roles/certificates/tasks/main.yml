    ownca_create_authority_key_identifier: yes
    privatekey_path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/etcd-server.key"
    csr_path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/etcd-server.csr"
    ownca_path: "{{ certificates.dir }}/etcd-ca.pem"
