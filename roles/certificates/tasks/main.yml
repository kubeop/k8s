# apiserver
- name: Cert | Generate apiserver.key
  community.crypto.openssl_privatekey:
    path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/apiserver.key"
    type: "{{ certificates.type }}"
    size: "{{ certificates.size }}"
    curve: "{{ 'secp256r1' if certificates.type == 'ECC' else omit }}"
  with_items:
    - "{{ groups['master'] }}"

- name: Cert | Aggregate all SANs
  ansible.builtin.set_fact:
    apiserver_sans: >-
      {{
        (
          sans_base
          + ips
          + hostnames
          + sans_lb
          + sans_lb_ip
          + sans_svc_ip
          + sans_svc_ip6
          + sans_access_ip
          + sans_access_domain
        ) | unique
      }}
  vars:
    sans_base:
      - "::1"
      - "127.0.0.1"
      - "localhost"
      - "kubernetes"
      - "kubernetes.default"
      - "kubernetes.default.svc"
      - "kubernetes.default.svc.cluster"
      - "kubernetes.default.svc.cluster.local"

    ips: "{{ groups['master'] }}"

    hostnames: >-
      {{
        groups['master']
        | map('extract', hostvars, 'hostname')
        | select('defined')
        | list
      }}

    sans_lb: "{{ [loadbalance.domain_name] if loadbalance.domain_name is defined else [] }}"
    sans_lb_ip: "{{ [loadbalance.ip] if loadbalance.ip is defined else [] }}"
    sans_svc_ip: >-
      {{
        [kubernetes.service_addresses
         | ansible.utils.ipaddr('net')
         | ansible.utils.ipaddr(1)
         | ansible.utils.ipaddr('address')]
        if kubernetes.ipv4_stack
        else []
      }}
    
    sans_svc_ip6: >-
      {{
        [kubernetes.service_addresses_ipv6
         | ansible.utils.ipaddr('net')
         | ansible.utils.ipaddr(1)
         | ansible.utils.ipaddr('address')]
        if kubernetes.ipv6_stack
        else []
      }}
    
    sans_access_ip: >-
      {{ loadbalance.access_ip | list if loadbalance.access_ip is defined else [] }}
    
    sans_access_domain: >-
      {{ loadbalance.access_domain | list if loadbalance.access_domain is defined else [] }}
  tags: facts

- name: Cert | Debug apiserver_sans
  ansible.builtin.debug:
    msg: "{{ apiserver_ips | map('regex_replace', '^(.*)$', 'IP:\\1') | list  +  apiserver_hosts | map('regex_replace', '^(.*)$', 'DNS:\\1') | list }}"
  vars:
    apiserver_ips: "{{ apiserver_sans | map('ansible.utils.ipaddr') | reject('equalto', False) | list }}"
    apiserver_hosts: "{{ apiserver_sans | difference(apiserver_ips) }}"

- name: Cert | Generate apiserver.csr
  vars:
    apiserver_ips: "{{ apiserver_sans | map('ansible.utils.ipaddr') | reject('equalto', False) | list }}"
    apiserver_hosts: "{{ apiserver_sans | difference(apiserver_ips) }}"
  community.crypto.openssl_csr:
    path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/apiserver.csr"
    privatekey_path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/apiserver.key"
    common_name: kube-apiserver
    use_common_name_for_san: no
    basic_constraints_critical: yes
    basic_constraints:
      - CA:FALSE
    key_usage_critical: yes
    key_usage:
      - digitalSignature
      - keyEncipherment
    extended_key_usage:
      - serverAuth
    subject_alt_name: "{{ apiserver_ips | map('regex_replace', '^(.*)$', 'IP:\\1') | list  +  apiserver_hosts | map('regex_replace', '^(.*)$', 'DNS:\\1') | list }}"
  with_items:
    - "{{ groups['master'] }}"

- name: Cert | Generate apiserver.pem
  community.crypto.x509_certificate:
    path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/apiserver.pem"
    provider: ownca
    ownca_not_after: "+{{certificates.day}}"
    ownca_create_subject_key_identifier: never_create
    ownca_create_authority_key_identifier: yes
    privatekey_path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/apiserver.key"
    csr_path: "{{ certificates.dir }}/{{ hostvars[item].hostname.split('-')[-2:] | join('-') | lower }}/apiserver.csr"
    ownca_path: "{{ certificates.dir }}/ca.pem"
    ownca_privatekey_path: "{{ certificates.dir }}/ca.key"
  with_items:
    - "{{ groups['master'] }}"

