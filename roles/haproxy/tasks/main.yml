---
- name: "Install HAProxy"
  package:
    name: haproxy
    state: present
  tags: install_haproxy

- name: "Get package facts"
  package_facts:
    manager: auto
  tags: generate_haproxy_cfg

- name: "Get HAProxy version"
  set_fact:
    haproxy_version: "{{ ansible_facts.packages['haproxy'][0].version }}"
  when:
    - ansible_facts.packages is defined
    - "'haproxy' in ansible_facts.packages"
    - ansible_facts.packages['haproxy'][0].version is version('2.0', '>=')
  tags: generate_haproxy_cfg

- name: "Set selinux for loadbalance port"
  when: ansible_os_family in ['RedHat', 'AlmaLinux', 'Rocky', 'TencentOS'] and security.selinux == true
  community.general.seport:
    ports: "{{ loadbalance.port }}"
    proto: tcp
    setype: http_port_t
    state: present
  tags: 
    - set_haproxy_selinux
    - generate_haproxy_cfg

- name: "Generate HAProxy configuration"
  template:
    src: "haproxy.cfg.j2"
    dest: "/etc/haproxy/haproxy.cfg"
  tags: generate_haproxy_cfg
  notify:
    - restart haproxy

- name: "Ensure HAProxy systemd override directory exists"
  file:
    path: /usr/lib/systemd/system/haproxy.service.d
    state: directory
    mode: '0755'
  tags: generate_haproxy_cfg

- name: "Set HAProxy systemd resource limits"
  ini_file:
    path: /usr/lib/systemd/system/haproxy.service.d/limits.conf
    section: Service
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    mode: '0644'
  loop:
    - { key: "LimitNOFILE", value: "655360" }
    - { key: "LimitNPROC", value: "655360" }
  tags: generate_haproxy_cfg
  notify:
    - restart haproxy
