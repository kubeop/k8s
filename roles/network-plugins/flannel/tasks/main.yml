---
- name: flannel | Create manifest
  ansible.builtin.template:
    src: "{{item.src}}"
    dest: "{{item.dest}}"
  with_items:
    - {src: "flannel.yaml.j2", dest: "/tmp/flannel.yaml"}
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  tags:
    - flannel
    - flannel_yaml

- name: flannel | Apply manifest
  ansible.builtin.shell: "kubectl apply -f /tmp/flannel.yaml"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  tags:
    - flannel
    - flannel_install
