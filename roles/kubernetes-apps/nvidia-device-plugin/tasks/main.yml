---
- name: Apps | Generate nvidia-device-plugin manifest
  ansible.builtin.template:
    src: "{{item.src}}"
    dest: "{{item.dest}}"
  with_items:
    - {src: "nvidia-device-plugin.yaml.j2", dest: "/tmp/nvidia-device-plugin.yaml"}
  tags: nvidia-device-plugin

- name: Apps | Deploy nvidia-device-plugin
  ansible.builtin.shell: "kubectl apply -f /tmp/nvidia-device-plugin.yaml"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  tags: nvidia-device-plugin
