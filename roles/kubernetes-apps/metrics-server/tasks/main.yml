---
- name: Apps | Generate metrics-server manifest
  ansible.builtin.template:
    src: "{{item.src}}"
    dest: "{{item.dest}}"
  with_items:
    - {src: "metrics-server.yaml.j2", dest: "/tmp/metrics-server.yaml"}
  tags: metrics-server

- name: Apps | Deploy metrics-server
  ansible.builtin.shell: "kubectl apply -f /tmp/metrics-server.yaml"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  tags: metrics-server
