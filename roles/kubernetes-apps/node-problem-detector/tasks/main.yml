---
- name: Apps | Generate node-problem-detector manifest
  ansible.builtin.template:
    src: "{{item.src}}"
    dest: "{{item.dest}}"
  with_items:
    - {src: "node-problem-detector.yaml.j2", dest: "/tmp/node-problem-detector.yaml"}
  tags: node-problem-detector

- name: Apps | Deploy node-problem-detector
  ansible.builtin.shell: "kubectl apply -f /tmp/node-problem-detector.yaml"
  delegate_to: "{{ groups['master'][0] }}"
  run_once: true
  tags: node-problem-detector
